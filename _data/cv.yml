  summary: "PhD student in Machine Learning at Université Paris-Saclay, where I work at the intersection of causal inference, representation learning, and survival analysis. I'm particularly interested in probabilistic deep learning with a particular focus on calibration of survival models in counterfactual settings. I'm also very passionate about software engineering and open source, and bileive that code qulity and software are key to taking research to the next level."

